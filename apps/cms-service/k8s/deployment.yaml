apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-service
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-service
  template:
    metadata:
      labels:
        app: cms-service
    spec:
      containers:
        - name: cms-service
          image: 445363793940.dkr.ecr.ap-south-1.amazonaws.com/cms-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: cms-service-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
